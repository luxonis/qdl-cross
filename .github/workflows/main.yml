name: Build and Release

on:
  workflow_dispatch:
  push:
    tags:
      - "latest"

jobs:
  build-linux:
    name: Build (${{ matrix.platform }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - platform: linux-x86_64
            container: alpine:latest
            rename: qdl-linux-x86_64
          - platform: linux-aarch64
            container: dockcross/linux-arm64-musl:latest
            rename: qdl-linux-aarch64

    container:
      image: ${{ matrix.container }}
      options: --init

    steps:
      - name: Install git
        if: matrix.container == 'alpine:latest'
        run: apk add --no-cache git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        if: matrix.container == 'alpine:latest'
        run: .ci/scripts/install_dependencies_alpine.sh

      - name: Set safe git directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Run build script
        env:
          PLATFORM: ${{ matrix.platform }}
        run: .ci/scripts/build_in_container.sh

      - name: Rename binary
        run: |
          mkdir -p artifacts
          cp .out/qdl/qdl artifacts/${{ matrix.rename }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.rename }}
          path: artifacts/${{ matrix.rename }}

  build-macos:
    name: Build (macOS)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: macos-x86_64
            runner: macos-13
          - platform: macos-aarch64
            runner: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: .ci/scripts/install_dependencies_macos.sh

      - name: Run build script
        env:
          PLATFORM: ${{ matrix.platform }}
        run: .ci/scripts/build_in_container.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdl-${{ matrix.platform }}
          path: .out/qdl-${{ matrix.platform }}.tar.gz

  build-windows:
    name: Build (Windows)
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - platform: windows-x86_64
            runner: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: git mingw-w64-x86_64-toolchain mingw-w64-x86_64-autotools

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run build script
        env:
          PLATFORM: ${{ matrix.platform }}
        run: .ci/scripts/build_in_container.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdl-${{ matrix.platform }}
          path: .out/qdl-${{ matrix.platform }}.tar.gz

  sign-windows:
    name: Sign (Windows)
    needs: [build-windows]
    environment: windows-signing
    runs-on: ["self-hosted", "win-signing-runner"]
    defaults:
      run:
        shell: cmd
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: qdl-windows-x86_64
          path: artifacts\qdl-windows-x86_64

      - name: Extract, sign, repack (no pwsh)
        run: |
          @echo on
          setlocal enabledextensions

          set "SIGNTOOL=C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x86\signtool.exe"
          set "CERT=C:\luxonis.cer"
          set "CSP=eToken Base Cryptographic Provider"
          set "CONTAINER=[${{ secrets.SECTIGO_CERT_PASSWORD }}]=Sectigo_20241111150706"
          set "URL=http://timestamp.sectigo.com"
          set "COMMON_ARGS=/f "%CERT%" /csp "%CSP%" /kc "%CONTAINER%" /tr %URL% /td sha256 /fd sha256 /n "Luxonis Holding Corporation" /d "qdl""

          set "BASE=%GITHUB_WORKSPACE%\artifacts\qdl-windows-x86_64"
          set "TGZ=%BASE%\qdl-windows-x86_64.tar.gz"
          set "OUT=%BASE%\extracted"

          echo BASE=%BASE%
          echo TGZ=%TGZ%
          echo OUT=%OUT%

          if not exist "%TGZ%" (
            echo ERROR: Missing artifact "%TGZ%"
            dir /s /b "%GITHUB_WORKSPACE%\artifacts"
            exit /b 1
          )

          if exist "%OUT%" rmdir /s /q "%OUT%"
          mkdir "%OUT%"
          if errorlevel 1 exit /b 1

          echo Extracting...
          tar -xf "%TGZ%" -C "%OUT%"
          if errorlevel 1 exit /b 1

          echo Contents to sign:
          dir /s /b "%OUT%"

          echo Signing all EXE and DLL files...
          for /r "%OUT%" %%F in (*.exe *.dll) do (
            echo Signing "%%F"
            "%SIGNTOOL%" sign %COMMON_ARGS% "%%F"
            if errorlevel 1 exit /b 1
          )

          echo Repacking...
          del /f /q "%TGZ%"
          if errorlevel 1 exit /b 1

          pushd "%OUT%"
          tar -czf "%TGZ%" *
          if errorlevel 1 exit /b 1
          popd

          echo Signed artifact ready:
          dir "%TGZ%"

      - name: Upload signed Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: qdl-windows-x86_64
          path: artifacts\qdl-windows-x86_64\qdl-windows-x86_64.tar.gz
          overwrite: true

  release:
    name: Publish Dated Release
    needs: [build-linux, build-macos, build-windows, sign-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate dated tag
        id: generate_tag
        run: |
          release_name="Release $(date +'%Y-%m-%d-%H%M')"
          echo "release_name=${release_name}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.generate_tag.outputs.release_name }}
          tag_name: latest
          files: |
            artifacts/qdl-linux-x86_64/qdl-linux-x86_64
            artifacts/qdl-linux-aarch64/qdl-linux-aarch64
            artifacts/qdl-macos-x86_64/qdl-macos-x86_64.tar.gz
            artifacts/qdl-macos-aarch64/qdl-macos-aarch64.tar.gz
            artifacts/qdl-windows-x86_64/qdl-windows-x86_64.tar.gz
          prerelease: false
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
